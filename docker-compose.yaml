version: '3.8'

services:
  florence-ai:
    build:
      context: .
      network: host
      args:
        - DEV_MODE=${DEV_MODE:-false}
    container_name: florence_ai
    image: florence_ai
    networks:
      - florence-net
      - infra-storage
    env_file: .env 
    environment:
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-11.0.0}
      - API_WORKER_COUNT=${API_WORKER_COUNT:-2}
    ports:
      - "${CHAINLIT_PORT}:8010"
      - "${FASTAPI_PORT}:8000"
    volumes:
      - .:/app
      - florence_model:/app/hf_cache
    restart: unless-stopped
    entrypoint: ["./entrypoint.sh"]
    devices:
      - ${AMD_GPU_DEVICE:-/dev/dri}:${AMD_GPU_DEVICE:-/dev/dri}
      - /dev/kfd:/dev/kfd
    group_add:
      - "${RENDER_GID:-44}"
      - "${VIDEO_GID:-44}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks: 
  florence-net:
    name: florence-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24  # Forces this specific safe range
  infra-storage:
    external: true

volumes:
  florence_model:
    name: florence_model
    driver: local