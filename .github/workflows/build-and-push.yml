name: Build and Push Florence-2 Image

on:
  workflow_dispatch:
    inputs:
      accelerator_type:
        description: 'Target hardware (cpu or rocm)'
        required: true
        default: 'cpu'
        type: choice
        options:
          - cpu
          - rocm
      image_tag:
        description: 'Tag for the final image'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  # Hardcode your custom lowercase name here
  CUSTOM_IMAGE_NAME: rb1811/fastapi_florence_${{ github.event.inputs.accelerator_type }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 1: Build the Base Image
      - name: Build Florence Base Image
        run: |
          docker build -f Dockerfile.base \
            --build-arg DEVICE=${{ github.event.inputs.accelerator_type }} \
            -t florence-base:latest .

      # Step 2: Build and Push Final Image
      - name: Build and Push Final Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.CUSTOM_IMAGE_NAME }}:${{ github.event.inputs.image_tag }}