version: '3.8'

services:
  florence-ai:
    build:
      context: .
      network: host
      args:
        - DEV_MODE=${DEV_MODE:-false}
    container_name: florence_ai_cpu
    image: florence_ai:cpu
    networks:
      - florence-net
      - infra-storage
    env_file: .env 
    environment:
      # CPU doesn't need HSA_OVERRIDE; lowered worker count for better stability
      - API_WORKER_COUNT=${API_WORKER_COUNT:-1}
      - DEVICE=cpu
    ports:
      - "${CHAINLIT_PORT:-8010}:8010"
      - "${FASTAPI_PORT:-8000}:8000"
    volumes:
      - .:/app
    restart: unless-stopped
    entrypoint: ["./entrypoint.sh"]
    # Log rotation to keep the host disk happy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # No devices or group_add here, allowing it to boot on standard RAM/CPU systems

networks: 
  florence-net:
    name: florence-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24 
  infra-storage:
    external: true